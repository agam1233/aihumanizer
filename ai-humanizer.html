<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Humanizer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            max-width: 900px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            text-align: center;
            color: #fff;
            margin-bottom: 10px;
            font-size: 2.5em;
            text-shadow: 0 0 10px rgba(100, 200, 255, 0.5);
        }

        .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .input-section, .output-section {
            margin-bottom: 25px;
        }

        label {
            display: block;
            color: #fff;
            margin-bottom: 10px;
            font-size: 1.1em;
            font-weight: 500;
        }

        textarea {
            width: 100%;
            height: 150px;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 1em;
            resize: vertical;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #6495ed;
        }

        textarea::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .keywords-section {
            margin-bottom: 25px;
        }

        .keywords-input {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .keywords-input input {
            flex: 1;
            padding: 12px 15px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 1em;
        }

        .keywords-input input:focus {
            outline: none;
            border-color: #6495ed;
        }

        .keywords-input button {
            padding: 12px 25px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            font-size: 1em;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .keywords-input button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .keywords-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .keyword-tag {
            background: rgba(102, 126, 234, 0.3);
            color: #fff;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.9em;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(102, 126, 234, 0.5);
        }

        .keyword-tag .remove {
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .keyword-tag .remove:hover {
            opacity: 1;
        }

        .options {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .option-group {
            flex: 1;
            min-width: 200px;
        }

        .option-group select {
            width: 100%;
            padding: 12px 15px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 1em;
            cursor: pointer;
        }

        .option-group select option {
            background: #302b63;
            color: #fff;
        }

        .humanize-btn {
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #11998e, #38ef7d);
            color: #fff;
            font-size: 1.2em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-bottom: 25px;
        }

        .humanize-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(56, 239, 125, 0.4);
        }

        .humanize-btn:active {
            transform: translateY(0);
        }

        .output-box {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 20px;
            min-height: 150px;
            color: #fff;
            font-size: 1em;
            line-height: 1.6;
            border: 1px solid rgba(255, 255, 255, 0.1);
            white-space: pre-wrap;
        }

        .copy-btn {
            margin-top: 15px;
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            cursor: pointer;
            transition: background 0.2s;
        }

        .copy-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .stat-box {
            flex: 1;
            min-width: 120px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-box .value {
            font-size: 1.5em;
            font-weight: 600;
            color: #38ef7d;
        }

        .stat-box .label {
            font-size: 0.85em;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 5px;
        }

        .preset-keywords {
            margin-bottom: 15px;
        }

        .preset-keywords span {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9em;
        }

        .preset-btn {
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            cursor: pointer;
            font-size: 0.85em;
            margin: 4px;
            transition: background 0.2s;
        }

        .preset-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ AI Humanizer</h1>
        <p class="subtitle">Transform AI-generated text into natural, human-like writing using keywords</p>

        <div class="input-section">
            <label for="inputText">Input Text (AI-generated)</label>
            <textarea id="inputText" placeholder="Paste your AI-generated text here..."></textarea>
        </div>

        <div class="keywords-section">
            <label>Keywords to Include</label>
            <div class="preset-keywords">
                <span>Quick presets:</span>
                <button class="preset-btn" onclick="addPreset('casual')">Casual</button>
                <button class="preset-btn" onclick="addPreset('professional')">Professional</button>
                <button class="preset-btn" onclick="addPreset('creative')">Creative</button>
                <button class="preset-btn" onclick="addPreset('academic')">Academic</button>
            </div>
            <div class="keywords-input">
                <input type="text" id="keywordInput" placeholder="Type a keyword and press Enter">
                <button onclick="addKeyword()">Add</button>
            </div>
            <div class="keywords-tags" id="keywordsTags"></div>
        </div>

        <div class="options">
            <div class="option-group">
                <label for="tone">Tone</label>
                <select id="tone">
                    <option value="natural">Natural</option>
                    <option value="casual">Casual</option>
                    <option value="professional">Professional</option>
                    <option value="friendly">Friendly</option>
                    <option value="enthusiastic">Enthusiastic</option>
                </select>
            </div>
            <div class="option-group">
                <label for="variation">Variation Level</label>
                <select id="variation">
                    <option value="low">Low</option>
                    <option value="medium" selected>Medium</option>
                    <option value="high">High</option>
                </select>
            </div>
        </div>

        <button class="humanize-btn" onclick="humanize()">🚀 Humanize Text</button>

        <div class="output-section">
            <label>Humanized Output</label>
            <div class="output-box" id="outputBox">Your humanized text will appear here...</div>
            <button class="copy-btn" onclick="copyOutput()">📋 Copy to Clipboard</button>
        </div>

        <div class="stats">
            <div class="stat-box">
                <div class="value" id="wordCount">0</div>
                <div class="label">Words</div>
            </div>
            <div class="stat-box">
                <div class="value" id="keywordCount">0</div>
                <div class="label">Keywords Used</div>
            </div>
            <div class="stat-box">
                <div class="value" id="humanScore">0%</div>
                <div class="label">Human Score</div>
            </div>
        </div>
    </div>

    <script>
        let keywords = [];

        const presets = {
            casual: ['honestly', 'basically', 'pretty much', 'kind of', 'you know', 'I mean', 'like', 'actually', 'totally', 'awesome'],
            professional: ['furthermore', 'moreover', 'consequently', 'nevertheless', 'accordingly', 'precisely', 'essentially', 'notably', 'significantly', 'effectively'],
            creative: ['imagine', 'picture this', 'envision', 'fascinating', 'remarkably', 'extraordinarily', 'captivating', 'breathtaking', 'mesmerizing', 'stunning'],
            academic: ['research suggests', 'studies indicate', 'evidence shows', 'it is worth noting', 'scholars argue', 'data reveals', 'analysis demonstrates', 'findings suggest', 'literature indicates', 'empirical evidence']
        };

        const replacements = {
            'utilize': ['use', 'make use of', 'work with'],
            'implement': ['set up', 'put in place', 'roll out'],
            'leverage': ['take advantage of', 'make the most of', 'tap into'],
            'facilitate': ['help', 'make easier', 'smooth the way for'],
            'subsequently': ['then', 'after that', 'later on'],
            'furthermore': ['also', 'on top of that', 'plus'],
            'nevertheless': ['still', 'even so', 'all the same'],
            'consequently': ['so', 'as a result', 'because of this'],
            'demonstrate': ['show', 'prove', 'make clear'],
            'significant': ['big', 'important', 'major'],
            'numerous': ['many', 'lots of', 'a bunch of'],
            'commence': ['start', 'begin', 'kick off'],
            'terminate': ['end', 'stop', 'wrap up'],
            'endeavor': ['try', 'attempt', 'give it a shot'],
            'ascertain': ['find out', 'figure out', 'determine'],
            'comprehensive': ['complete', 'thorough', 'full'],
            'paradigm': ['model', 'pattern', 'way of thinking'],
            'synergy': ['teamwork', 'working together', 'collaboration'],
            'optimize': ['improve', 'make better', 'fine-tune'],
            'methodology': ['method', 'approach', 'way']
        };

        const sentenceStarters = [
            'Here\'s the thing tho',
            'Let me put it this way',
            'You know what? Honestly,',
            'I\'ve got to say,',
            'The truth is,',
            'Look,',
            'To be fair,',
            'In my experience,',
            'What\'s interesting is',
            'The way I see it,'
        ];

        const transitions = [
            'And here\'s the kicker -',
            'But wait, there\'s more.',
            'Now, this is where it gets interesting.',
            'Let\'s not forget,',
            'On a similar note,',
            'What\'s more,',
            'Adding to that,',
            'Here\'s another angle:',
            'It\'s worth mentioning that',
            'Not to mention,'
        ];

        document.getElementById('keywordInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                addKeyword();
            }
        });

        function addKeyword() {
            const input = document.getElementById('keywordInput');
            const keyword = input.value.trim().toLowerCase();
            if (keyword && !keywords.includes(keyword)) {
                keywords.push(keyword);
                renderKeywords();
            }
            input.value = '';
        }

        function removeKeyword(keyword) {
            keywords = keywords.filter(k => k !== keyword);
            renderKeywords();
        }

        function renderKeywords() {
            const container = document.getElementById('keywordsTags');
            container.innerHTML = keywords.map(k => 
                `<span class="keyword-tag">${k} <span class="remove" onclick="removeKeyword('${k}')">×</span></span>`
            ).join('');
        }

        function addPreset(preset) {
            presets[preset].forEach(k => {
                if (!keywords.includes(k)) {
                    keywords.push(k);
                }
            });
            renderKeywords();
        }

        function getRandomItem(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        function humanize() {
            const inputText = document.getElementById('inputText').value;
            if (!inputText.trim()) {
                alert('Please enter some text to humanize!');
                return;
            }

            const tone = document.getElementById('tone').value;
            const variation = document.getElementById('variation').value;
            
            let text = inputText;
            let keywordsUsed = 0;

            // Apply word replacements
            for (const [word, alternatives] of Object.entries(replacements)) {
                const regex = new RegExp(`\\b${word}\\b`, 'gi');
                if (regex.test(text)) {
                    text = text.replace(regex, getRandomItem(alternatives));
                }
            }

            // Split into sentences
            let sentences = text.split(/(?<=[.!?])\s+/);
            
            // Add sentence starters occasionally
            if (variation !== 'low' && sentences.length > 2) {
                const startIndex = Math.floor(Math.random() * 3);
                if (Math.random() > 0.5) {
                    sentences[startIndex] = getRandomItem(sentenceStarters) + ' ' + sentences[startIndex].charAt(0).toLowerCase() + sentences[startIndex].slice(1);
                }
            }

            // Add transitions between sentences
            if (variation === 'high' && sentences.length > 3) {
                for (let i = 2; i < sentences.length; i += 3) {
                    if (Math.random() > 0.4) {
                        sentences[i] = getRandomItem(transitions) + ' ' + sentences[i].charAt(0).toLowerCase() + sentences[i].slice(1);
                    }
                }
            }

            text = sentences.join(' ');

            // Insert keywords naturally
            if (keywords.length > 0) {
                const paragraphs = text.split('\n\n');
                text = paragraphs.map((para, pIndex) => {
                    if (para.trim()) {
                        const words = para.split(' ');
                        const insertPoints = Math.min(keywords.length, Math.ceil(words.length / 20));
                        
                        for (let i = 0; i < insertPoints; i++) {
                            const keyword = keywords[(pIndex + i) % keywords.length];
                            const insertAt = Math.floor(Math.random() * (words.length - 5)) + 3;
                            
                            // Find a good insertion point (after punctuation or at natural break)
                            let actualInsert = insertAt;
                            for (let j = insertAt; j < Math.min(insertAt + 10, words.length); j++) {
                                if (words[j] && words[j].endsWith(',')) {
                                    actualInsert = j + 1;
                                    break;
                                }
                            }
                            
                            if (actualInsert < words.length) {
                                words.splice(actualInsert, 0, keyword);
                                keywordsUsed++;
                            }
                        }
                        return words.join(' ');
                    }
                    return para;
                }).join('\n\n');
            }

            // Apply tone adjustments
            switch (tone) {
                case 'casual':
                    text = text.replace(/\bdo not\b/gi, "don't");
                    text = text.replace(/\bcannot\b/gi, "can't");
                    text = text.replace(/\bwill not\b/gi, "won't");
                    text = text.replace(/\bI am\b/gi, "I'm");
                    text = text.replace(/\bdo you\b/gi, "d'you");
                    break;
                case 'friendly':
                    text = text.replace(/\bhowever\b/gi, "but hey");
                    text = text.replace(/\btherefore\b/gi, "so");
                    text = text.replace(/\badditionally\b/gi, "also");
                    break;
                case 'enthusiastic':
                    if (!text.includes('!')) {
                        const parts = text.split('.');
                        if (parts.length > 2) {
                            parts[parts.length - 2] = parts[parts.length - 2] + '!';
                            text = parts.join('.');
                        }
                    }
                    break;
            }

            // Add some natural imperfections for high variation
            if (variation === 'high') {
                text = text.replace(/\bvery\b/gi, Math.random() > 0.5 ? 'really' : 'super');
                text = text.replace(/\bgood\b/gi, Math.random() > 0.5 ? 'great' : 'solid');
            }

            // Update output
            document.getElementById('outputBox').textContent = text;
            
            // Update stats
            const wordCount = text.split(/\s+/).filter(w => w).length;
            document.getElementById('wordCount').textContent = wordCount;
            document.getElementById('keywordCount').textContent = keywordsUsed;
            
            // Calculate human score
            let score = 70;
            score += Math.min(keywordsUsed * 3, 15);
            if (variation === 'high') score += 10;
            if (variation === 'medium') score += 5;
            if (tone !== 'professional') score += 5;
            score = Math.min(score, 98);
            document.getElementById('humanScore').textContent = score + '%';
        }

        function copyOutput() {
            const output = document.getElementById('outputBox').textContent;
            navigator.clipboard.writeText(output).then(() => {
                const btn = document.querySelector('.copy-btn');
                btn.textContent = '✅ Copied!';
                setTimeout(() => {
                    btn.textContent = '📋 Copy to Clipboard';
                }, 2000);
            });
        }
    </script>
</body>
</html>
